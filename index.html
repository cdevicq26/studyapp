<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#E4E9F2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StudyApp">
  <title>StudyApp</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>html, body, #lock-screen { background: #E4E9F2; }</style>
</head>
<body>
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-logo">📚</div>
    <div class="lock-title">StudyOS</div>
    <div class="lock-sub">Code à 6 chiffres pour Charles</div>
    <input id="lock-pin" class="lock-pin" type="tel" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="••••••">
    <div id="lock-error" class="lock-error"></div>
    <button id="lock-submit" class="lock-submit">Connexion</button>
    <div class="lock-divider">ou</div>
    <button id="lock-guest" class="lock-guest">Continuer en invité</button>
    <div class="lock-guest-note">Mode invité : rien n'est sauvegardé sur cet appareil</div>
  </div>
</div>

<div id="app">
  <div id="view-home"    class="view active"></div>
  <div id="view-learn"   class="view"></div>
  <div id="view-agenda"  class="view"></div>
  <div id="view-stats"   class="view"></div>

  <nav class="navbar">
    <button class="nav-btn active" data-nav="home" onclick="showView('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Accueil</span>
    </button>
    <button class="nav-btn" data-nav="learn" onclick="showView('learn')">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span class="nav-label">Étudier</span>
    </button>
    <button class="nav-btn" data-nav="agenda" onclick="showView('agenda')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="nav-label">Agenda</span>
    </button>
    <button class="nav-btn" data-nav="stats" onclick="showView('stats')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="nav-label">Stats</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<div id="question-modal" class="qmodal">
  <div class="qmodal-box">
    <div class="qmodal-title">❓ Poser une question</div>
    <div class="qmodal-context" id="qmodal-context"></div>
    <textarea id="qmodal-input" class="qmodal-input" placeholder="Qu'est-ce qui n'est pas clair ?"></textarea>
    <div class="qmodal-actions">
      <button class="qmodal-btn qmodal-cancel" onclick="closeQuestionModal()">Annuler</button>
      <button class="qmodal-btn qmodal-save" onclick="saveQuestion()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
